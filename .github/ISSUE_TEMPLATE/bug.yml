name: 🐞 Bug Report
description: 버그 리포트
title: "[Bug] "
labels: ["type:bug"]

body:

  - type: dropdown
    id: severity
    attributes:
      label: 🚨 Severity
      description: 영향도
      options:
        - severity:critical
        - severity:major
        - severity:minor
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: 🧱 Layer
      description: 문제 발생 레이어
      options:
        - layer:api
        - layer:domain
        - layer:adapter
        - layer:frontend
        - layer:infra
    validations:
      required: true

  - type: input
    id: milestone
    attributes:
      label: 🏁 Milestone
      placeholder: MS-01_Stabilization

  - type: textarea
    id: description
    attributes:
      label: 🐞 버그 설명
      description: 어떤 문제가 발생했는지 설명

  - type: textarea
    id: reproduce
    attributes:
      label: 🔁 재현 방법
      placeholder: |
        1. 홈 화면 이동
        2. 캐릭터 선택
        3. 네트워크 탭 확인

  - type: textarea
    id: expected
    attributes:
      label: 🎯 기대 결과

  - type: textarea
    id: actual
    attributes:
      label: 💥 실제 결과

  - type: textarea
    id: environment
    attributes:
      label: 🖥 환경
      placeholder: |
        env: dev
        browser: Chrome
        device: Desktop

  - type: textarea
    id: logs
    attributes:
      label: 📎 로그 / 스크린샷 / 링크

  # -----------------------------
  # AI 개발용 섹션
  # -----------------------------

  - type: textarea
    id: technical_context
    attributes:
      label: 🧠 Technical Context (AI 개발 참고)
      description: 관련 코드 흐름 / 데이터 구조
      placeholder: |
        예)

        이미지 URL 생성 위치
        character_meta.image_url

        가능 위치
        apps/api/*
        src/usecases/*
        adapters/storage/*

  - type: textarea
    id: fix_strategy
    attributes:
      label: 🛠 Fix Strategy
      description: 수정 방향
      placeholder: |
        예)

        R2 public URL 사용 금지

        CDN URL 사용

        https://img.arcanaverse.ai/assets/char/{id}.png

        주의
        - DB 데이터 변경 금지
        - URL 변환은 API layer에서 처리

  - type: textarea
    id: code_hint
    attributes:
      label: 📂 Code Location Hint
      description: 코드 위치 힌트
      placeholder: |
        apps/api/
        src/usecases/
        adapters/storage/