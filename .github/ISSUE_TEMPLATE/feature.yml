name: ✨ Feature
description: 기능 추가
title: "[Feature] "
labels: ["type:feature"]

body:

  - type: input
    id: milestone
    attributes:
      label: 🏁 Milestone
      placeholder: MS-02_Features

  - type: textarea
    id: goal
    attributes:
      label: 🎯 목표
      description: 기능 목적

  - type: textarea
    id: requirements
    attributes:
      label: 📋 요구사항
      placeholder: |
        - 기능1
        - 기능2
        - 기능3

  - type: textarea
    id: non_scope
    attributes:
      label: 🚫 비범위
      description: 이번 작업에서 하지 않을 것

  - type: textarea
    id: acceptance
    attributes:
      label: ✅ 완료 조건
      placeholder: |
        - API 정상 동작
        - 테스트 통과
        - Swagger 반영

  # -----------------------------
  # AI 개발용 섹션
  # -----------------------------

  - type: textarea
    id: architecture
    attributes:
      label: 🏗 Architecture Impact
      description: 시스템 영향 범위
      placeholder: |
        영향 영역

        API
        DB
        Session
        Token Ledger
        Policy

  - type: textarea
    id: technical_context
    attributes:
      label: 🧠 Technical Context
      placeholder: |
        관련 코드

        apps/api/*
        src/usecases/*
        adapters/*

  - type: textarea
    id: implementation_strategy
    attributes:
      label: 🛠 Implementation Strategy
      placeholder: |
        구현 전략

        - API 추가
        - DB schema 변경 없음
        - domain layer 로직 추가

  - type: textarea
    id: code_hint
    attributes:
      label: 📂 Code Location Hint
      placeholder: |
        apps/api/
        src/domain/
        adapters/