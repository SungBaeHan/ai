name: Feature
description: 게임 기능 / 시스템 추가
title: "[Feature] "
labels: ["feature"]

body:
  - type: input
    attributes:
      label: 🚀 Release Version
      placeholder: PRD_v10, v11 등
    validations:
      required: true

  - type: textarea
    attributes:
      label: 🎯 목적
      description: 왜 이 기능이 필요한가?
    validations:
      required: true

  - type: textarea
    attributes:
      label: 🧩 구현 내용
      description: 시스템 / 로직 / UI 기준 설명
    validations:
      required: true

  - type: textarea
    attributes:
      label: 📌 Scope
      description: 포함 / 제외 명확히 작성

  - type: textarea
    attributes:
      label: 🗄️ 영향 범위
      description: DB / 세션 / 토큰 / 정책 등

  - type: textarea
    attributes:
      label: ✅ 완료 조건
      description: Done 정의
      required: true