name: 🔧 Task
description: 개발 작업
title: "[Task] "
labels: ["type:task"]

body:

  - type: input
    id: milestone
    attributes:
      label: 🏁 Milestone
      placeholder: MS-02_Features

  - type: textarea
    id: description
    attributes:
      label: 📋 작업 설명

  - type: textarea
    id: objective
    attributes:
      label: 🎯 목적

  - type: textarea
    id: acceptance
    attributes:
      label: ✅ 완료 조건

  # -----------------------------
  # AI 개발용 섹션
  # -----------------------------

  - type: textarea
    id: scope_lock
    attributes:
      label: 🔒 Scope Lock (AI 작업 범위 제한)
      description: 변경 가능 / 변경 금지 영역
      placeholder: |
        변경 가능

        src/domain/*
        adapters/*

        변경 금지

        auth system
        db schema

  - type: textarea
    id: technical_context
    attributes:
      label: 🧠 Technical Context
      placeholder: |
        관련 코드

        apps/api/*
        src/domain/*
        adapters/*

  - type: textarea
    id: implementation_strategy
    attributes:
      label: 🛠 Implementation Strategy
      placeholder: |
        작업 방식

        - validation 추가
        - 로깅 개선
        - 테스트 코드 추가