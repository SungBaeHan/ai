name: Task
description: 유지보수/리팩토링/정책/인프라/문서 (TRPG)
title: "[Task] "
labels:
  - "type:chore"

body:
  - type: dropdown
    id: milestone
    attributes:
      label: 🏁 Milestone (생성 후 Milestone도 지정)
      description: 이슈 생성 후 오른쪽 Milestone에서 선택해주세요.
      options:
        - "MS-01_Stabilization"
        - "MS-02_Scope_Lock"
        - "MS-03_Next_Features"
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: 🧭 Task Type (라벨도 같이 지정)
      description: 필요하면 오른쪽 Labels에서 type:refactor / type:hotfix 로 바꿔주세요.
      options:
        - "type:chore (유지보수/문서/설정)"
        - "type:refactor (구조개선/정리)"
        - "type:hotfix (긴급 수정)"
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: 🧱 Layer (라벨도 같이 지정)
      description: 이슈 생성 후 오른쪽 Labels에서 동일한 layer:* 라벨을 꼭 추가해주세요.
      options:
        - "layer:presentation (UI/입출력/뷰)"
        - "layer:service (유스케이스/오케스트레이션)"
        - "layer:domain (도메인 규칙/엔티티)"
        - "layer:policy (권한/쿼터/접근제어)"
        - "layer:adapter (외부연동/DB/LLM/Stripe)"
        - "layer:infra (배포/CI/CD/환경)"
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 🧠 배경
      description: 왜 이 작업을 하는가? (문제/근거/현재 상태)
    validations:
      required: true

  - type: textarea
    id: work
    attributes:
      label: 🔧 작업 내용
      description: 해야 할 일을 체크리스트로 쪼개기
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: risk
    attributes:
      label: ⚠ 리스크 / 주의사항
      description: 성능/세이브 데이터/호환성/롤백 포인트 등

  - type: checkboxes
    id: impact
    attributes:
      label: 🧪 영향 범위 (체크)
      options:
        - label: 세이브 데이터
        - label: 전투 시스템
        - label: 월드 상태
        - label: 인증/결제
        - label: 토큰 회계

  - type: textarea
    id: done
    attributes:
      label: ✅ 완료 조건
      placeholder: |
        - [ ] 테스트 통과
        - [ ] 로그/메트릭 확인
        - [ ] 문서/SSOT 반영(필요 시)
    validations:
      required: true